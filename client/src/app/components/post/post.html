<mat-card class="post-card" appearance="raised">
  <div class="game-banner" [style.background-image]="'url(' + game_image + ')'">
    <div class="banner-overlay">
      <div class="match-score" *ngIf="compatibility_score > 0 && !is_owner">
        <mat-icon>favorite</mat-icon>
        {{compatibility_score}}% Match
      </div>
    </div>
  </div>

  <mat-card-header>
    <div mat-card-avatar class="user-avatar-container">
      <img [src]="user_info?.imageUrl" class="user-avatar" (click)="$event.stopPropagation(); go_to_profile()">
    </div>
    <mat-card-title class="post-title">{{post?.info?.title}}</mat-card-title>
    <mat-card-subtitle class="post-subtitle">
      <span class="username" (click)="$event.stopPropagation(); go_to_profile()">{{user_info?.username}}</span>
      <span class="dot">&middot;</span>
      <span class="time">{{time_string}}</span>
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content class="post-description-container">
    <p class="post-description">{{post?.info?.description}}</p>
  </mat-card-content>

  <mat-card-footer class="post-footer">
    <div class="footer-content">
      <div class="tag-cells">
        @for (chip of chips; track $index) {
          <div class="tag-cell" [class]="'tag-' + chip.color">
            {{chip.text}}
          </div>
        }
      </div>
      
      @if (join_clicked.observed) {
        <button mat-flat-button color="primary" class="view-button" (click)="join_clicked.emit(post)">
          View
        </button>
      }
      @if (is_owner) {
        <button mat-flat-button color="accent" class="view-button" (click)="edit_post()" style="margin-right: 8px;">Edit</button>
        <button mat-flat-button color="warn" class="view-button" (click)="delete_post()">Delete</button>
      }
    </div>
  </mat-card-footer>
</mat-card>
