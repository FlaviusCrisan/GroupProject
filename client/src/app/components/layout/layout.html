<div class="app-container">
  <div class="glass-navbar">
    <div class="logo-container" (click)="home()">
      <span class="logo-text">Game<span class="logo-accent">Match</span></span>
    </div>

    <div class="nav-links">
      <a class="nav-link" (click)="home()">Home</a>
      <a class="nav-link" (click)="post_game()">New Game</a>
      <a class="nav-link" (click)="match_history()">History</a>
      <a class="nav-link" (click)="chats()">Chats</a>
    </div>

    <span class="spacer"></span>

    <div class="nav-actions">
      <button mat-icon-button (click)="toggle_theme()" class="theme-toggle">
        <mat-icon>{{ is_dark ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <div class="user-profile" (click)="go_to_profile()">
        @if (user_info?.imageUrl) {
          <img [src]="user_info?.imageUrl" class="user-avatar">
        } @else {
          <mat-icon>account_circle</mat-icon>
        }
      </div>

      <button mat-icon-button class="theme-toggle" (click)="sign_out()" title="Sign Out">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </div>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <app-setup-dialog *ngIf="show_setup"></app-setup-dialog>
</div>
