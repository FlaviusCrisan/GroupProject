<div class="app-container">
  <mat-toolbar class="main-header">
    <button mat-icon-button (click)="sidenav.toggle()" class="menu-button">
      <mat-icon>menu</mat-icon>
    </button>
    
    <div class="logo-container" (click)="home()">
      <span class="logo-text">Game<span class="logo-accent">Match</span></span>
    </div>

    <span class="spacer"></span>

    <div class="nav-actions">
      <button mat-flat-button color="accent" (click)="post_game()" class="create-button">
        <mat-icon>add</mat-icon>
        <span class="button-text">Create Lobby</span>
      </button>

      <button mat-icon-button (click)="toggle_theme()" class="theme-toggle">
        <mat-icon>{{ is_dark ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <div class="user-profile" (click)="go_to_profile()">
        @if (user_info?.imageUrl) {
          <img [src]="user_info?.imageUrl" class="user-avatar">
        } @else {
          <mat-icon>account_circle</mat-icon>
        }
      </div>
    </div>
  </mat-toolbar>
  <mat-sidenav-container style="flex: 1">
    <mat-sidenav #sidenav mode="side">
      <mat-nav-list>
          <a mat-list-item (click)="sign_out()">
            <mat-icon matListItemIcon>logout</mat-icon>
            <span matListItemTitle>Sign Out</span>
          </a>
          <a mat-list-item (click)="home()">
            <mat-icon matListItemIcon>home</mat-icon>
            <span matListItemTitle>Home</span>
          </a>
          <a mat-list-item (click)="go_to_profile()">
            <mat-icon matListItemIcon>account_circle</mat-icon>
            <span matListItemTitle>Profile</span>
          </a>
          <a mat-list-item (click)="post_game()">
            <mat-icon matListItemIcon>add</mat-icon>
            <span matListItemTitle>New Game</span>
          </a>
          <a mat-list-item (click)="match_history()">
            <mat-icon matListItemIcon>history</mat-icon>
            <span matListItemTitle>History</span>
          </a>
      </mat-nav-list>
    </mat-sidenav>
    <mat-sidenav-content>
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
  <div style="height: 50px"></div>
</div>
