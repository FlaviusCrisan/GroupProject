<div class="history-page">
  <div class="history-content">
    <div class="history-header">
      <p>History</p>
      <span>Your requests and accepted games</span>
    </div>

    <mat-card class="history-section">
      <mat-card-header>
        <mat-card-title>Requested</mat-card-title>
        <mat-card-subtitle>Games you asked to join</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <app-post-list [current_user_joined]="false"></app-post-list>
      </mat-card-content>
    </mat-card>

    <mat-card class="history-section">
      <mat-card-header>
        <mat-card-title>Joined</mat-card-title>
        <mat-card-subtitle>Accepted games and active chats</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <app-post-list [current_user_joined]="true"></app-post-list>
      </mat-card-content>
    </mat-card>
  </div>
</div>
