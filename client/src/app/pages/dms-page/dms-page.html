<div style="display: grid; place-items: center; height: 100%">
  <mat-card appearance="outlined" style="width: 600px; height: 90%; min-height: 0">
    <mat-card-content style="display: flex; flex-direction: column; height: 100%; align-items: center; gap: 12px; min-height: 0">
      <div style="display: flex; width: 100%; align-items: center">
        <a href="/user/{{left_user_info?.id}}">
          <img style="border-radius: 9999px; width: 50px; height: 50px" src="{{left_user_info?.imageUrl}}">
        </a>
        <p style="margin: 3px 0px; font-size: 30px; margin-left: 12px">{{left_user_info?.username}}</p>
      </div>
      <div class="message-container">
        <div *ngFor="let message of message_list" [ngClass]="message.sender_id == right_user_info?.id ? 'right' : 'left'" class="message"><p>{{message.content}}</p></div>
        <div #bottom></div>
      </div>
      <mat-form-field appearance="outline" style="width: 100%">
        <textarea matInput cdkTextareaAutosize placeholder="Send a message" name="chat_message" [(ngModel)]="chat_message" (keydown.enter)="send($event)"></textarea>
        <mat-icon matSuffix (click)="send($event)">send</mat-icon>
      </mat-form-field>
    </mat-card-content>
  </mat-card>
</div>
