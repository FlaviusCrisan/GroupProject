<div style="display: flex; flex-direction: column; align-items: center">
  <mat-card appearance="outlined" style="width: 800px">
    <mat-card-content style="display: flex; flex-direction: column; align-items: center; gap: 12px">
      <img style="border-radius: 9999px; width: 100px; height: 100px" src="{{user_info?.imageUrl}}">
      <p style="margin: 3px 0px; font-size: 30px">{{user_info?.username}}</p>
      <button matButton="filled">Send a message</button>
    </mat-card-content>
  </mat-card>
</div>
