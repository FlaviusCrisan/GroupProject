<mat-sidenav-container class="example-container">
  <mat-sidenav #sidenav mode="side">

    <mat-nav-list>
        <a mat-list-item href="#">
          <mat-icon matListItemIcon>account_circle</mat-icon>
          <span matListItemTitle>Profile</span>
        </a>
        <a mat-list-item href="#">
          <mat-icon matListItemIcon>add</mat-icon>
          <span matListItemTitle>Post Game</span>
        </a>
        <a mat-list-item href="#">
          <mat-icon matListItemIcon>history</mat-icon>
          <span matListItemTitle>Match History</span>
        </a>
    </mat-nav-list>

  </mat-sidenav>

  <mat-sidenav-content>

    <button mat-icon-button (click)="sidenav.toggle()">
      <mat-icon>menu</mat-icon>
    </button>

    <div class="cards-grid">
      <mat-card *ngFor="let post of posts" appearance="outlined">
        <mat-card-header>
          <mat-card-title>{{post.info}}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p>content</p>
        </mat-card-content>
        <mat-card-footer class="card-footer">
          <mat-chip-set aria-label="Chihuahua traits">
            <mat-chip>tag</mat-chip>
            <mat-chip>tag</mat-chip>
            <mat-chip>tag</mat-chip>
          </mat-chip-set>
          <button matButton="filled">Join</button>
        </mat-card-footer>
      </mat-card>
    </div>
    
    <div class="post">
      <p>Want to start a game?</p>
      <button matButton="filled" routerLink="/post-game">Post your game</button>
      <mat-form-field appearance="fill">
        <mat-label>text</mat-label>
        <input matInput placeholder="Enter text" [(ngModel)]="text">
      </mat-form-field>
      <button matButton="filled" (click)="add()">add</button>
    </div>

  </mat-sidenav-content>
</mat-sidenav-container>
