<div class="home-page">
  <div class="hero-banner">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>Find your perfect squad</h1>
      <p>Connect with players globally and dominate together.</p>
      <button class="glass-button primary-glow" (click)="quickMatch()" style="margin-top: 20px; padding: 15px 40px; font-size: 18px;">
        <mat-icon>bolt</mat-icon> Quick Match
      </button>
    </div>
  </div>
  
  <section class="matches-section">
    <div class="section-title">
      <p>Open lobbies</p>
      <span>Use filters to find better teammates</span>
    </div>
    <app-post-list [show_filters]="true"></app-post-list>
  </section>
</div>
